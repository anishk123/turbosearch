services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: turbosearch
      POSTGRES_PASSWORD: turbosearch
      POSTGRES_DB: turbosearch
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turbosearch -d turbosearch"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "if [ \"$${EMBEDDING_PROVIDER}\" = qwen ]; then
        pip install -e '.[embeddings]';
      else
        pip install -e .;
      fi &&
      uvicorn turbosearch.api:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql://turbosearch:turbosearch@postgres:5432/turbosearch
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-qwen}
      EMBEDDING_MODEL: Qwen/Qwen3-Embedding-0.6B
      EMBEDDING_DIM: 1024
      INDEX_DIM: 256
      INDEX_VERSION: 1
      VECTOR_INDEX_PATH: /app/.turbosearch/vectors.json
      OVERVIEW_MODE: ${OVERVIEW_MODE:-llm}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_API_KEY: ollama
      LLM_MODEL: ${LLM_MODEL:-qwen3:0.6b}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - vector-index:/app/.turbosearch
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
  vector-index:
