services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: turbosearch
      POSTGRES_PASSWORD: turbosearch
      POSTGRES_DB: turbosearch
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turbosearch -d turbosearch"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

